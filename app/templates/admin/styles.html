{% extends "admin/base.html" %}

{% block content %}
  <h1>Styles</h1>
  <p class="muted">Manage configured styles. <code>default</code> is required and cannot be removed.</p>

  <form id="styles-form">
    <div id="styles-container" data-next-index="{{ styles|length }}">
      {% for style in styles %}
        <div class="card style-item" data-style-index="{{ loop.index0 }}" data-style-key="{{ style.key }}">
          <div class="row">
            <div>
              <label>Name
                {% if style.key == "default" %}
                  <input value="{{ style.key }}" disabled>
                  <input type="hidden" name="styles[{{ loop.index0 }}][name]" value="{{ style.key }}">
                  <input type="hidden" name="styles[{{ loop.index0 }}][system]" value="default">
                {% else %}
                  <input name="styles[{{ loop.index0 }}][name]" value="{{ style.key }}">
                  <input type="hidden" name="styles[{{ loop.index0 }}][system]" value="">
                {% endif %}
              </label>
            </div>
            <div>
              <label>Title
                <input name="styles[{{ loop.index0 }}][title]" value="{{ style.title }}">
              </label>
            </div>
          </div>
          <label>Instruction
            <textarea name="styles[{{ loop.index0 }}][instruction]" rows="5">{{ style.instruction }}</textarea>
          </label>
          {% if style.key != "default" %}
            <button type="button" class="remove-style">Remove style</button>
          {% endif %}
        </div>
      {% endfor %}
    </div>

    <div class="actions">
      <button type="button" id="add-style-btn">+ Add style</button>
      <button
        type="button"
        hx-post="/styles/validate"
        hx-include="#styles-form"
        hx-target="#status-panel"
        hx-swap="innerHTML"
      >Validate</button>
      <button
        type="button"
        hx-post="/styles/apply"
        hx-include="#styles-form"
        hx-target="#status-panel"
        hx-swap="innerHTML"
      >Apply</button>
    </div>
  </form>

  <div id="status-panel"></div>

  <template id="style-template">
    <div class="card style-item" data-style-index="__S_INDEX__" data-style-key="">
      <div class="row">
        <div>
          <label>Name
            <input name="styles[__S_INDEX__][name]" value="">
          </label>
          <input type="hidden" name="styles[__S_INDEX__][system]" value="">
        </div>
        <div>
          <label>Title
            <input name="styles[__S_INDEX__][title]" value="">
          </label>
        </div>
      </div>
      <label>Instruction
        <textarea name="styles[__S_INDEX__][instruction]" rows="5"></textarea>
      </label>
      <button type="button" class="remove-style">Remove style</button>
    </div>
  </template>

{% endblock %}

{% block scripts %}
  <script src="{{ request.url_for('static', path='admin/styles.js') }}"></script>
{% endblock %}
