name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          # если версия уже зафиксирована в pyproject/.python-version,
          # можно заменить на:
          # python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check --no-fix .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Flake8 custom rules
        run: uv run flake8 .

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run mypy
        run: uv run mypy .
        # лучше заменить "." на реальные каталоги проекта,
        # например: uv run mypy src tests

  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest